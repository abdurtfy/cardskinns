<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | carddesign.skin</title>
    <meta name="description" content="Admin login for carddesign.skin." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="login-page">
      <form class="login-panel" id="loginForm">
        <a class="brand" href="./index.html" aria-label="carddesign.skin home">
          <span class="brand-mark"></span>
          <span>carddesign.skin</span>
        </a>
        <div>
          <p class="eyebrow">Admin</p>
          <h1>Login</h1>
        </div>
        <label>
          Password
          <input name="password" type="password" required autocomplete="current-password" autofocus />
        </label>
        <button class="primary-action full" type="submit">Open admin</button>
        <p class="status-line" id="loginStatus" role="status"></p>
      </form>
    </main>

    <script src="./admin-login.js"></script>
  </body>
</html>
